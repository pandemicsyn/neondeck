<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Neondeck icon</title>
  <desc id="desc">A neon dashboard mark with Miami tiger stripes and an angular N.</desc>
