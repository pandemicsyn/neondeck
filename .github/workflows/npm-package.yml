name: npm package

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-package-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Validate npm package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package assets
        run: npm run build:dashboard

      - name: Validate package contents
        run: npm run check:npm-package

      - name: Smoke test packed CLI
        run: npm run smoke:npm-pack
