name: Secrets scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan pull request for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
