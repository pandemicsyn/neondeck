name: Publish npm package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Branch, tag, or commit to validate. A real publish requires an exact v<package-version> tag.
        required: true
        default: main
        type: string
      npm_tag:
        description: npm dist-tag to apply. Auto uses next for prereleases and latest for stable versions.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - latest
          - next
      dry_run:
        description: Pack and validate without publishing.
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Use npm 11 CLI
        run: |
          npm install --global npm@^11.15.0
          npm --version

      - name: Resolve release metadata
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_REF: ${{ github.ref_name }}
          REQUESTED_REF: ${{ inputs.release_ref }}
          REQUESTED_NPM_TAG: ${{ inputs.npm_tag }}
          REQUESTED_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          package_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          expected_tag="v${package_version}"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            release_ref="${REQUESTED_REF}"
            npm_tag="${REQUESTED_NPM_TAG}"
            dry_run="${REQUESTED_DRY_RUN}"
          else
            release_ref="${PUSH_REF}"
            npm_tag="auto"
            dry_run="false"
          fi

          if [ "${dry_run}" != "true" ]; then
            if [[ ! "${release_ref}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
              echo "Release tag must be valid semver such as v1.2.3 or v1.2.3-beta.1; got ${release_ref}." >&2
              exit 1
            fi
            if [ "${release_ref}" != "${expected_tag}" ]; then
              echo "package.json version ${package_version} requires release tag ${expected_tag}; got ${release_ref}." >&2
              exit 1
            fi
          fi

          if [ "${npm_tag}" = "auto" ]; then
            if [[ "${package_version}" == *-* ]]; then
              npm_tag="next"
            else
              npm_tag="latest"
            fi
          fi

          echo "ref=${release_ref}" >> "$GITHUB_OUTPUT"
          echo "tag=${expected_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${npm_tag}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: npm run release:npm:check

      - name: Check registry state
        id: registry
        if: steps.release.outputs.dry_run != 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          set +e
          registry_output="$(npm view "neondeck@${RELEASE_VERSION}" version --json 2>&1)"
          registry_status=$?
          set -e
          if [ "${registry_status}" -eq 0 ]; then
            echo "neondeck@${RELEASE_VERSION} is already published; verifying the existing release."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! grep -q 'E404' <<<"${registry_output}"; then
            echo "Could not confirm that neondeck@${RELEASE_VERSION} is unpublished:" >&2
            echo "${registry_output}" >&2
            exit "${registry_status}"
          fi
          echo "already_published=false" >> "$GITHUB_OUTPUT"

      - name: Configure temporary npm token
        if: steps.release.outputs.dry_run != 'true' && steps.registry.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
            echo "Using NPM_TOKEN for this publish."
          else
            echo "No NPM_TOKEN configured; npm will use trusted publishing/OIDC."
          fi

      - name: Publish package
        if: steps.release.outputs.dry_run == 'true' || steps.registry.outputs.already_published != 'true'
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          NPM_TAG: ${{ steps.release.outputs.npm_tag }}
          DRY_RUN: ${{ steps.release.outputs.dry_run }}
        run: |
          set -euo pipefail
          args=(publish --tag "${NPM_TAG}")
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          npm "${args[@]}"

      - name: Verify published package
        if: steps.release.outputs.dry_run != 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            tmp="$(mktemp -d)"
            if npm view "neondeck@${RELEASE_VERSION}" name version dist-tags --json \
              && npm init -y --prefix "${tmp}" >/dev/null \
              && npm install --ignore-scripts --prefix "${tmp}" "neondeck@${RELEASE_VERSION}" \
              && npx --prefix "${tmp}" neondeck --home "${tmp}/home" --json status >/dev/null; then
              rm -rf "${tmp}"
              exit 0
            fi
            rm -rf "${tmp}"
            if [ "${attempt}" -eq 12 ]; then
              echo "neondeck@${RELEASE_VERSION} did not become installable after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Registry propagation is still pending (attempt ${attempt}/12); retrying in 5 seconds."
            sleep 5
          done
